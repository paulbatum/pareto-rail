<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>raild gameplay snapshot</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #02040a;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      (() => {
        const DEFAULT_SEED = 20260704;
        const params = new URLSearchParams(location.search);
        const seedParam = params.get('seed');
        const seed = seedParam === null ? DEFAULT_SEED : Number(seedParam);
        if (!Number.isInteger(seed)) throw new Error(`Snapshot seed must be an integer: ${seedParam}`);

        window.__nativeRandom = Math.random;
        window.__snapshotSeed = seed;
        Math.random = mulberry32(seed);

        function mulberry32(value) {
          let a = value >>> 0;
          return () => {
            a += 0x6d2b79f5;
            let t = a;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
      })();
    </script>
    <script type="module" src="/src/dev-tools/gameplay-snapshot.ts"></script>
  </body>
</html>
