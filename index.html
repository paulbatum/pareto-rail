<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Play procedural rail-shooter levels and compare generated game quality against measured cost." />
    <meta name="theme-color" content="#060a13" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 viewBox=%220 0 36 24%22%3E%3Cpath d=%22M2 20h32M4 18 11 11l6 4 8-10 7 3M26 3h6v6%22 fill=%22none%22 stroke=%22%23ff3dbf%22 stroke-width=%221.8%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22%2F%3E%3C%2Fsvg%3E" />
    <title>Pareto Rail</title>
    <style>
      html, body { margin: 0; min-width: 320px; min-height: 100dvh; background: #02040a; color: #e8f6ff; font-family: ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', Menlo, monospace; }
      #loading { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; background: radial-gradient(ellipse at center, rgb(10 20 40 / 55%), rgb(1 2 6 / 92%)); }
      body:not(.booting) #loading { display: none; }
      .loading-panel { width: min(360px, calc(100vw - 48px)); letter-spacing: .22em; text-align: center; text-transform: uppercase; }
      .loading-label { margin-bottom: 14px; color: #46e8ff; text-shadow: 0 0 14px rgb(70 232 255 / 65%); }
      .loading-track { height: 2px; overflow: hidden; background: rgb(70 232 255 / 18%); }
      .loading-bar { width: 45%; height: 100%; background: #46e8ff; box-shadow: 0 0 18px rgb(70 232 255 / 90%); animation: loading-sweep 1.05s ease-in-out infinite; }
      @keyframes loading-sweep { 0% { transform: translateX(-110%); } 100% { transform: translateX(250%); } }
    </style>
  </head>
  <body class="booting">
    <div id="loading" aria-live="polite"><div class="loading-panel"><div class="loading-label">Loading</div><div class="loading-track"><div class="loading-bar"></div></div></div></div>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
